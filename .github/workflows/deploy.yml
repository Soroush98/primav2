# Build, verify, and deploy both services to Cloud Run on push to main.
#
# Auth is keyless via Workload Identity Federation — NO service-account JSON key is
# stored in GitHub. Configure these repo-level settings first (see DEPLOY.md → CI/CD):
#   Variables: GCP_PROJECT, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOYER_SA, GCP_RUNTIME_SA
#
# Flow:  verify (tests/lint/build)  →  backend deploy  →  frontend deploy + CORS lock.
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  REGION: ${{ vars.GCP_REGION }}
  PROJECT: ${{ vars.GCP_PROJECT }}

jobs:
  # ---------------------------------------------------------------- gate
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend — lint + tests
        working-directory: backend
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync
          uv run ruff check app scripts
          uv run pytest -q          # torch-only tests self-skip (importorskip)

      - name: Frontend — build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ------------------------------------------------------------- backend
  backend:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: prima-backend
          source: backend
          region: ${{ env.REGION }}
          flags: --service-account=${{ vars.GCP_RUNTIME_SA }} --allow-unauthenticated
          env_vars: |-
            GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT }}
            GOOGLE_CLOUD_LOCATION=global
            GEMINI_MODEL=gemini-2.5-flash
            BIGQUERY_DATASET=alibaba_cluster
            FRONTEND_ORIGIN=*

  # ------------------------------------------------------------ frontend
  frontend:
    needs: backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image with the backend URL baked in (NEXT_PUBLIC_API_URL)
        run: |
          gcloud auth configure-docker "$REGION-docker.pkg.dev" -q
          gcloud artifacts repositories create web --repository-format=docker \
            --location="$REGION" 2>/dev/null || true
          IMAGE="$REGION-docker.pkg.dev/$PROJECT/web/prima-frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ needs.backend.outputs.url }}" \
            -t "$IMAGE" frontend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: prima-frontend
          image: ${{ env.IMAGE }}
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated

      - name: Lock backend CORS to the deployed frontend
        run: |
          gcloud run services update prima-backend --region "$REGION" \
            --update-env-vars "FRONTEND_ORIGIN=${{ steps.deploy.outputs.url }}"

# Build, verify, and deploy both services to Cloud Run on push to main.
#
# Auth is keyless via Workload Identity Federation — NO service-account JSON key is
# stored in GitHub. Configure these repo-level settings first (see DEPLOY.md → CI/CD):
#   Variables: GCP_PROJECT, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOYER_SA, GCP_RUNTIME_SA
#
# Flow:  verify (tests/lint/build)  →  backend deploy  →  frontend deploy + CORS lock.
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  REGION: ${{ vars.GCP_REGION }}
  PROJECT: ${{ vars.GCP_PROJECT }}

jobs:
  # ---------------------------------------------------------------- gate
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Backend — lint + tests
        working-directory: backend
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync
          uv run ruff check app scripts
          uv run pytest -q          # torch-only tests self-skip (importorskip)

      - name: Frontend — set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'        # match frontend/Dockerfile (node:24-slim) — no CI/prod drift
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ------------------------------------------------------------- backend
  backend:
    needs: verify
    if: ${{ github.ref == 'refs/heads/main' && vars.GCP_WIF_PROVIDER != '' }}
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v7
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v3
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: prima-backend
          source: backend
          region: ${{ env.REGION }}
          flags: --service-account=${{ vars.GCP_RUNTIME_SA }} --allow-unauthenticated --max-instances=3 --concurrency=40 --memory=1Gi --min-instances=1
          env_vars: |-
            GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT }}
            GOOGLE_CLOUD_LOCATION=global
            GEMINI_MODEL=gemini-2.5-flash
            BIGQUERY_DATASET=alibaba_cluster
            API_KEY=${{ secrets.BACKEND_API_KEY }}
            OMNI_CHECKPOINT_URI=gs://${{ vars.GCP_PROJECT }}-models/omni/omni_global.pt
            CHRONOS_MODEL=amazon/chronos-bolt-tiny
            FRONTEND_ORIGIN=*

  # ------------------------------------------------------------ frontend
  frontend:
    needs: backend
    if: ${{ github.ref == 'refs/heads/main' && vars.GCP_WIF_PROVIDER != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v3

      # The frontend proxies to the backend SERVER-SIDE (see app/api/analyze/route.ts),
      # so the backend URL + API key are runtime env vars — no build arg, no secret in
      # the browser. Source-deploy builds the standalone image via Cloud Build.
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: prima-frontend
          source: frontend
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated --max-instances=3 --concurrency=40 --memory=512Mi
          env_vars: |-
            BACKEND_URL=${{ needs.backend.outputs.url }}
            BACKEND_API_KEY=${{ secrets.BACKEND_API_KEY }}
